<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<title>Mic Visualizer</title>
<style>
  :root {
    --glass: rgba(18, 18, 24, 0.48);
    --glass-strong: rgba(24, 24, 34, 0.72);
    --line: rgba(255, 255, 255, 0.18);
    --white: rgba(255, 255, 255, 0.92);
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    position: fixed;
    inset: 0;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
  }

  #start {
    position: fixed;
    left: 50%;
    top: 50%;
    width: min(24vw, 132px);
    height: min(24vw, 132px);
    min-width: 86px;
    min-height: 86px;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 999px;
    background:
      radial-gradient(circle at 35% 28%, rgba(255,255,255,0.22), transparent 35%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.10), rgba(255,255,255,0.035) 55%, rgba(255,255,255,0.01));
    color: white;
    display: grid;
    place-items: center;
    box-shadow:
      0 0 36px rgba(255,255,255,0.12),
      inset 0 0 30px rgba(255,255,255,0.08);
    cursor: pointer;
    opacity: 1;
    transition: opacity 850ms ease, transform 850ms ease, filter 850ms ease;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  #start svg {
    width: 42%;
    height: 42%;
    opacity: 0.94;
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.28));
  }

  #start.fade {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.72);
    filter: blur(8px);
    pointer-events: none;
  }

  #settings {
    position: fixed;
    left: 50%;
    bottom: max(18px, env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(24px) scale(0.98);
    width: min(94vw, 720px);
    max-width: calc(100vw - 24px);
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: var(--glass);
    box-shadow: 0 18px 55px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    backdrop-filter: blur(22px) saturate(125%);
    -webkit-backdrop-filter: blur(22px) saturate(125%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 260ms ease, transform 260ms ease;
  }

  #settings.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0) scale(1);
  }

  .panel {
    display: grid;
    grid-template-columns: repeat(5, 46px) 1fr 1fr 1fr;
    gap: 10px;
    align-items: center;
  }

  .iconBtn {
    width: 46px;
    height: 46px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.055);
    color: var(--white);
    display: grid;
    place-items: center;
    padding: 0;
    cursor: pointer;
    box-shadow: inset 0 0 22px rgba(255,255,255,0.03);
  }

  .iconBtn svg {
    width: 22px;
    height: 22px;
    opacity: 0.92;
  }

  .iconBtn.active {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 20px rgba(255,255,255,0.20), inset 0 0 24px rgba(255,255,255,0.08);
  }

  .sliderWrap {
    height: 46px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.13);
    background: rgba(255,255,255,0.045);
    display: grid;
    place-items: center;
    padding: 0 14px;
  }

  input[type="range"] {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    height: 30px;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 99px;
    background: linear-gradient(90deg, rgba(255,255,255,0.22), rgba(255,255,255,0.86));
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    margin-top: -10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.94);
    box-shadow: 0 0 18px rgba(255,255,255,0.30);
  }

  input[type="range"]::-moz-range-track {
    height: 4px;
    border-radius: 99px;
    background: linear-gradient(90deg, rgba(255,255,255,0.22), rgba(255,255,255,0.86));
  }

  input[type="range"]::-moz-range-thumb {
    width: 24px;
    height: 24px;
    border: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.94);
    box-shadow: 0 0 18px rgba(255,255,255,0.30);
  }

  @media (orientation: portrait) {
    #settings {
      width: min(92vw, 430px);
      border-radius: 32px;
    }
    .panel {
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .iconBtn {
      width: 100%;
      height: 48px;
    }
    .sliderWrap {
      grid-column: 1 / -1;
      height: 48px;
    }
  }
</style>
</head>
<body>
<canvas id="viz"></canvas>

<button id="start" aria-label="Start microphone">
  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M12 14.25a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4.25a4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <path d="M19 10.25a7 7 0 0 1-14 0M12 17.25V21M8.6 21h6.8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  </svg>
</button>

<div id="settings" aria-hidden="true">
  <div class="panel">
    <button class="iconBtn" id="mute" aria-label="Mute microphone">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 14.25a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4.25a4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="1.65" stroke-linecap="round"/>
        <path d="M19 10.25a7 7 0 0 1-14 0M12 17.25V21M8.6 21h6.8" stroke="currentColor" stroke-width="1.65" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="iconBtn" id="mode" aria-label="Change visualizer">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 12c2.4-5.3 5.1-5.3 8 0s5.6 5.3 8 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M4 16c2.4-5.3 5.1-5.3 8 0s5.6 5.3 8 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity=".55"/>
      </svg>
    </button>

    <button class="iconBtn" id="palette" aria-label="Change color">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.7"/>
        <path d="M12 4a8 8 0 0 1 0 16 4 4 0 0 1 0-8 4 4 0 0 0 0-8Z" fill="currentColor" opacity=".78"/>
      </svg>
    </button>

    <button class="iconBtn" id="layout" aria-label="Change orientation">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3.5" y="7" width="17" height="10" rx="2.4" stroke="currentColor" stroke-width="1.7"/>
        <path d="M8 12h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity=".72"/>
      </svg>
    </button>

    <button class="iconBtn" id="full" aria-label="Fullscreen">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M8.5 4H4v4.5M15.5 4H20v4.5M8.5 20H4v-4.5M15.5 20H20v-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="sliderWrap"><input id="sensitivity" aria-label="Sensitivity" type="range" min="0.35" max="3.2" value="1.45" step="0.01"></div>
    <div class="sliderWrap"><input id="motion" aria-label="Motion" type="range" min="0.25" max="2.6" value="1.05" step="0.01"></div>
    <div class="sliderWrap"><input id="detail" aria-label="Detail" type="range" min="0.4" max="1.6" value="1" step="0.01"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('viz');
  const ctx = canvas.getContext('2d', { alpha: false });
  const startBtn = document.getElementById('start');
  const settings = document.getElementById('settings');
  const muteBtn = document.getElementById('mute');
  const modeBtn = document.getElementById('mode');
  const paletteBtn = document.getElementById('palette');
  const layoutBtn = document.getElementById('layout');
  const fullBtn = document.getElementById('full');
  const sensitivity = document.getElementById('sensitivity');
  const motion = document.getElementById('motion');
  const detail = document.getElementById('detail');

  let audioCtx, analyser, stream, freq, wave;
  let running = false;
  let muted = false;
  let mode = 0;
  let palette = 0;
  let layout = 0;
  let frame = 0;
  let dpr = 1;
  let W = 0, H = 0, CX = 0, CY = 0, MIN = 0, MAX = 0;
  let bass = 0, mid = 0, treble = 0, volume = 0;
  let sBass = 0, sMid = 0, sTreble = 0, sVolume = 0;
  let idlePulse = 0;
  let lastTap = 0;

  const particles = [];
  const palettes = [
    [198, 286, 326],
    [38, 350, 285],
    [156, 205, 265],
    [15, 45, 330],
    [220, 260, 300]
  ];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.floor(window.innerWidth * dpr);
    H = Math.floor(window.innerHeight * dpr);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    CX = W / 2;
    CY = H / 2;
    MIN = Math.min(W, H);
    MAX = Math.max(W, H);
    seedParticles();
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  function seedParticles() {
    const count = Math.floor(Math.max(260, Math.min(820, (W * H) / 4200)));
    particles.length = 0;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.pow(Math.random(), 0.62) * MAX * 0.55;
      particles.push({
        a,
        r,
        z: Math.random(),
        seed: Math.random() * 1000,
        drift: (Math.random() - 0.5) * 0.012,
        size: Math.random() * 1.8 + 0.35
      });
    }
  }

  function avg(arr, from, to) {
    let sum = 0;
    const a = Math.max(0, Math.floor(from));
    const b = Math.min(arr.length, Math.floor(to));
    for (let i = a; i < b; i++) sum += arr[i];
    return b > a ? sum / ((b - a) * 255) : 0;
  }

  function getAudio() {
    if (!running || muted || !analyser) {
      bass = mid = treble = volume = 0;
      return;
    }

    analyser.getByteFrequencyData(freq);
    analyser.getByteTimeDomainData(wave);

    bass = avg(freq, 2, 18);
    mid = avg(freq, 18, 92);
    treble = avg(freq, 92, 260);

    let sum = 0;
    for (let i = 0; i < wave.length; i++) {
      const v = (wave[i] - 128) / 128;
      sum += v * v;
    }
    volume = Math.sqrt(sum / wave.length);
  }

  function smoothAudio() {
    const sens = parseFloat(sensitivity.value);
    const targetBass = Math.min(1, bass * sens * 1.65);
    const targetMid = Math.min(1, mid * sens * 1.35);
    const targetTreble = Math.min(1, treble * sens * 1.25);
    const targetVolume = Math.min(1, volume * sens * 3.25);

    sBass += (targetBass - sBass) * 0.13;
    sMid += (targetMid - sMid) * 0.11;
    sTreble += (targetTreble - sTreble) * 0.09;
    sVolume += (targetVolume - sVolume) * 0.16;
    idlePulse = running ? Math.max(0.02, sVolume) : 0;
  }

  function hsl(h, s, l, a) {
    return `hsla(${((h % 360) + 360) % 360}, ${s}%, ${l}%, ${a})`;
  }

  function clear() {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = running ? `rgba(0, 0, 0, ${0.16 - Math.min(0.08, sVolume * 0.06)})` : '#000';
    ctx.fillRect(0, 0, W, H);
  }

  function transformPoint(x, y) {
    if (layout === 1) return { x: x * 1.42, y: y * 0.74 };
    if (layout === 2) return { x: x * 0.74, y: y * 1.32 };
    if (W > H * 1.35) return { x: x * 1.26, y: y * 0.82 };
    if (H > W * 1.18) return { x: x * 0.86, y: y * 1.12 };
    return { x, y };
  }

  function drawBackground(t) {
    const p = palettes[palette];
    const g = ctx.createRadialGradient(CX, CY, MIN * 0.04, CX, CY, MAX * 0.58);
    g.addColorStop(0, hsl(p[0] + t * 12, 88, 17 + sVolume * 18, 0.34 + sVolume * 0.18));
    g.addColorStop(0.34, hsl(p[1] - t * 8, 85, 11 + sMid * 14, 0.18 + sMid * 0.15));
    g.addColorStop(0.72, hsl(p[2] + t * 5, 88, 7 + sBass * 12, 0.08 + sBass * 0.10));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawAurora(t) {
    const p = palettes[palette];
    const layers = 5 + Math.floor(parseFloat(detail.value) * 3);
    const mo = parseFloat(motion.value);

    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (let l = 0; l < layers; l++) {
      const base = MIN * (0.15 + l * 0.032 + sBass * 0.105);
      const amp = MIN * (0.025 + sVolume * 0.12 + l * 0.004);
      const points = Math.floor(180 * parseFloat(detail.value));
      const hue = p[l % p.length] + t * (18 + l * 4) + sTreble * 80;
      ctx.beginPath();
      for (let i = 0; i <= points; i++) {
        const u = i / points;
        const a = u * Math.PI * 2;
        const bin = freq ? freq[Math.floor(u * freq.length * 0.62)] / 255 : 0;
        const ripple = Math.sin(a * (3 + l) + t * (0.9 + l * 0.18) * mo) * 0.42
                     + Math.sin(a * (7 + l * 2) - t * (1.4 + l * 0.16) * mo) * 0.26
                     + Math.sin(a * (13 + l) + t * 0.47 * mo) * 0.12;
        const r = base + amp * ripple + bin * MIN * (0.018 + sMid * 0.075);
        const skew = transformPoint(Math.cos(a) * r, Math.sin(a) * r);
        const x = CX + skew.x;
        const y = CY + skew.y;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = hsl(hue, 95, 62, 0.15 + sVolume * 0.26 - l * 0.012);
      ctx.lineWidth = dpr * (1.1 + l * 0.38 + sBass * 4.5);
      ctx.shadowBlur = dpr * (18 + sVolume * 52);
      ctx.shadowColor = hsl(hue, 98, 60, 0.48);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawWaveGlass(t) {
    if (!wave) return;
    const p = palettes[palette];
    const mo = parseFloat(motion.value);
    const lines = mode === 2 ? 9 : 5;
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap = 'round';

    for (let l = 0; l < lines; l++) {
      ctx.beginPath();
      const yBase = CY + (l - (lines - 1) / 2) * MIN * 0.038;
      const amp = MIN * (0.035 + sVolume * 0.22) * (1 - l * 0.045);
      const hue = p[(l + 1) % p.length] + t * 35 + l * 22;
      const steps = Math.floor(180 * parseFloat(detail.value));
      for (let i = 0; i <= steps; i++) {
        const u = i / steps;
        const idx = Math.floor(u * (wave.length - 1));
        const v = ((wave[idx] || 128) - 128) / 128;
        const x0 = (u - 0.5) * MAX * 0.86;
        const y0 = v * amp + Math.sin(u * Math.PI * 6 + t * mo + l) * MIN * 0.012;
        const pt = transformPoint(x0, y0 + (yBase - CY));
        const x = CX + pt.x;
        const y = CY + pt.y;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = hsl(hue, 94, 66, 0.13 + sMid * 0.25);
      ctx.lineWidth = dpr * (1.1 + sTreble * 3.5);
      ctx.shadowBlur = dpr * (16 + sMid * 45);
      ctx.shadowColor = hsl(hue, 96, 60, 0.40);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  function drawParticles(t) {
    const p = palettes[palette];
    const mo = parseFloat(motion.value);
    const density = parseFloat(detail.value);
    const useCount = Math.floor(particles.length * Math.min(1, 0.58 + density * 0.36));

    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < useCount; i++) {
      const q = particles[i];
      const swirl = 0.0028 * mo + sBass * 0.010 + q.drift;
      q.a += swirl * (0.35 + q.z);
      q.r += (sVolume * 1.7 + 0.035) * dpr * (0.35 + q.z) * mo;
      const maxR = MAX * (0.54 + sBass * 0.22);
      if (q.r > maxR) {
        q.r = MIN * (0.04 + Math.random() * 0.08);
        q.a = Math.random() * Math.PI * 2;
        q.z = Math.random();
      }

      const breathe = Math.sin(t * (0.8 + q.z) + q.seed) * MIN * 0.012 * sMid;
      const pt = transformPoint(Math.cos(q.a) * (q.r + breathe), Math.sin(q.a) * (q.r + breathe));
      const x = CX + pt.x;
      const y = CY + pt.y;
      const hue = p[i % p.length] + q.z * 80 + t * 18 + sTreble * 110;
      const alpha = 0.035 + q.z * 0.17 + sVolume * 0.22;
      const size = dpr * q.size * (0.8 + q.z * 1.7 + sBass * 4.2);
      ctx.fillStyle = hsl(hue, 100, 68, alpha);
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCore(t) {
    const p = palettes[palette];
    const radius = MIN * (0.035 + sBass * 0.050 + sVolume * 0.030);
    const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, radius * 8);
    g.addColorStop(0, 'rgba(255,255,255,' + (0.55 + sVolume * 0.35) + ')');
    g.addColorStop(0.16, hsl(p[0] + t * 50, 95, 72, 0.38 + sVolume * 0.30));
    g.addColorStop(0.48, hsl(p[1] - t * 34, 95, 58, 0.16 + sMid * 0.24));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX, CY, radius * (5.2 + sBass * 4), 0, Math.PI * 2);
    ctx.fill();
  }

  function draw() {
    frame++;
    const t = performance.now() * 0.001;
    getAudio();
    smoothAudio();
    clear();

    if (running || idlePulse > 0) {
      drawBackground(t);
      if (mode === 0) {
        drawParticles(t);
        drawAurora(t);
        drawWaveGlass(t);
      } else if (mode === 1) {
        drawAurora(t);
        drawParticles(t);
      } else {
        drawWaveGlass(t);
        drawAurora(t);
        drawParticles(t);
      }
      drawCore(t);
    }

    requestAnimationFrame(draw);
  }

  async function startMic() {
    try {
      startBtn.classList.add('fade');
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      await audioCtx.resume();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.76;
      freq = new Uint8Array(analyser.frequencyBinCount);
      wave = new Uint8Array(analyser.fftSize);
      source.connect(analyser);
      running = true;
    } catch (e) {
      startBtn.classList.remove('fade');
    }
  }

  function toggleSettings() {
    if (!running) return;
    settings.classList.toggle('open');
    settings.setAttribute('aria-hidden', settings.classList.contains('open') ? 'false' : 'true');
  }

  function setMuted(next) {
    muted = next;
    muteBtn.classList.toggle('active', muted);
    if (stream) stream.getAudioTracks().forEach(track => { track.enabled = !muted; });
  }

  startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    startMic();
  });

  canvas.addEventListener('pointerdown', () => {
    const now = performance.now();
    if (now - lastTap < 220) return;
    lastTap = now;
    toggleSettings();
  });

  settings.addEventListener('pointerdown', e => e.stopPropagation());
  settings.addEventListener('click', e => e.stopPropagation());

  muteBtn.addEventListener('click', () => setMuted(!muted));
  modeBtn.addEventListener('click', () => {
    mode = (mode + 1) % 3;
    modeBtn.classList.toggle('active', mode !== 0);
  });
  paletteBtn.addEventListener('click', () => {
    palette = (palette + 1) % palettes.length;
    paletteBtn.classList.add('active');
    clearTimeout(paletteBtn._t);
    paletteBtn._t = setTimeout(() => paletteBtn.classList.remove('active'), 420);
  });
  layoutBtn.addEventListener('click', () => {
    layout = (layout + 1) % 3;
    layoutBtn.classList.toggle('active', layout !== 0);
  });
  fullBtn.addEventListener('click', async () => {
    try {
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
        fullBtn.classList.add('active');
      } else if (document.exitFullscreen) {
        await document.exitFullscreen();
        fullBtn.classList.remove('active');
      }
    } catch (e) {}
  });

  window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(resize, 250), { passive: true });
  document.addEventListener('visibilitychange', async () => {
    if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (e) {}
    }
  });

  resize();
  draw();
})();
</script>
</body>
</html>
