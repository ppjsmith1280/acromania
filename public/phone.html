<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Phone Join</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b0f14; color: #e9eef5; }
    .wrap { padding: 18px; display: grid; gap: 12px; }
    h1 { margin: 0; font-size: 26px; }
    input { font-size: 18px; padding: 14px; border-radius: 14px; border: 1px solid #233; background: #0f1622; color: #e9eef5; }
    button { font-size: 18px; padding: 14px; border-radius: 14px; border: none; background: #2b7cff; color: white; }
    .status { opacity: 0.8; min-height: 22px; }
    .me { background: #111926; border-radius: 18px; padding: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Join Game</h1>
    <div class="status" id="status">Connecting...</div>

    <input id="name" placeholder="Your name" maxlength="16" />
    <button id="join">Join</button>

    <div class="me" id="me" style="display:none;"></div>
  </div>

<script>
  const statusEl = document.getElementById("status");
  const nameEl = document.getElementById("name");
  const joinBtn = document.getElementById("join");
  const meEl = document.getElementById("me");

  function wsUrl() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    return `${proto}://${location.host}/ws`;
  }

  const ws = new WebSocket(wsUrl());

  ws.onopen = () => {
    statusEl.textContent = "Connected. Enter a name.";
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === "join_ok") {
      statusEl.textContent = "Joined!";
      meEl.style.display = "block";
      meEl.textContent = `You are: ${msg.username}`;
      return;
    }

    if (msg.type === "join_denied") {
      statusEl.textContent = `Name not allowed: ${msg.reason}`;
      return;
    }

    if (msg.type === "error") {
      statusEl.textContent = msg.message;
    }
  };

  ws.onclose = () => {
    statusEl.textContent = "Disconnected. Refresh.";
  };

  joinBtn.onclick = () => {
    const username = (nameEl.value || "").trim();
    if (!username) {
      statusEl.textContent = "Type a name first.";
      return;
    }
    ws.send(JSON.stringify({ type: "join", username }));
  };
</script>
</body>
</html>
